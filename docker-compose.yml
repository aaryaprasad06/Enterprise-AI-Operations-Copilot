version: "3.9"

services:
  postgres:
    image: postgres:17

    container_name: aiops_postgres

    environment:
      POSTGRES_USER: aiops_user
      POSTGRES_PASSWORD: aiops_password
      POSTGRES_DB: aiops_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: